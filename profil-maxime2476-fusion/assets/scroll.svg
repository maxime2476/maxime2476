<svg viewBox="0 0 900 110" width="900" height="110" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flèches animées vers le bas : les dépôts épinglés se trouvent juste en dessous">
  <style>
    .ch { fill:none; stroke-width:3.5; stroke-linecap:round; stroke-linejoin:round;
          opacity:0; animation: cascade 2s ease-in-out infinite; }
    .c1 { stroke:#0969DA; animation-delay:0s;    }
    .c2 { stroke:#1F6FEB; animation-delay:0.22s; }
    .c3 { stroke:#58A6FF; animation-delay:0.44s; }

    @media (prefers-color-scheme: dark) {
      .c1 { stroke:#1F6FEB; }
      .c2 { stroke:#58A6FF; }
      .c3 { stroke:#9BCBFF; }
    }

    @keyframes cascade {
      0%   { opacity:0; transform: translateY(-10px); }
      35%  { opacity:1; transform: translateY(0); }
      70%  { opacity:0; transform: translateY(10px); }
      100% { opacity:0; transform: translateY(10px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .ch { animation:none; opacity:1; transform:none; }
    }
  </style>

  <g class="ch c1"><path d="M 424 22 L 450 42 L 476 22"/></g>
  <g class="ch c2"><path d="M 424 46 L 450 66 L 476 46"/></g>
  <g class="ch c3"><path d="M 424 70 L 450 90 L 476 70"/></g>
</svg>
