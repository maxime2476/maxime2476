name: WakaTime Stats Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  update-readme:
    name: Mettre à jour les stats WakaTime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Génération des métriques
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: false
          BLOCKS: █░
          TIME_RANGE: last_7_days
          SHOW_TIME: true
          SHOW_MASK_TIME: false
          LANG_COUNT: 5
