name: Scores de qualité logicielle
on:
  schedule:
    - cron: "30 3 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install requests

      - name: Générer les scores de qualité
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/generate_quality_scores.py

      - name: Commit et push si modifié
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/quality-scores.svg
          git diff --staged --quiet && exit 0
          git commit -m "🏗️ Mise à jour des scores de qualité [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Tentative $i échouée, retry dans 5s..."
            sleep 5
          done
          echo "Échec du push après 3 tentatives"
          exit 1
