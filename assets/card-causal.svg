<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="420" height="240" role="img" aria-labelledby="t">
  <title id="t">Causal inference: LP, LP-DiD, DML and Bayesian LP on ALFRED point-in-time vintages; pre-registered null, shipped as v0.1.0</title>
  <style>
    .bone{fill:#E8E4DA}.slate{fill:#9AA3AB}.gold{fill:#D4AF37}
    .serif{font-family:Georgia,'Times New Roman',serif}
    .sans{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif}
    .mono{font-family:'Cascadia Code','SF Mono',Consolas,'Liberation Mono',monospace}
    .in{animation:fade .7s ease-out both}
    @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    @media (prefers-reduced-motion:reduce){.in{animation:none}}
  </style>
  <rect x="1" y="1" width="418" height="238" rx="16" fill="#101214" stroke="#262B30" stroke-width="1.5"/>
  <g class="in">
    <text x="28" y="48" class="mono gold" font-size="10.5" letter-spacing="2.6">CAUSAL INFERENCE</text>
    <text x="27" y="80" class="serif bone" font-size="21.5">Identification before estimation</text>
    <line x1="28" y1="98" x2="392" y2="98" stroke="#262B30" stroke-width="1"/>

    <text x="28"  y="128" class="mono slate" font-size="10" letter-spacing="1.4">ESTIMATORS</text>
    <text x="126" y="128" class="sans bone" font-size="13">LP &#183; LP-DiD &#183; DML &#183; Bayesian LP</text>

    <text x="28"  y="158" class="mono slate" font-size="10" letter-spacing="1.4">DATA</text>
    <text x="126" y="158" class="sans bone" font-size="13">ALFRED point-in-time vintages</text>

    <text x="28"  y="188" class="mono slate" font-size="10" letter-spacing="1.4">RESULT</text>
    <text x="126" y="188" class="sans bone" font-size="13">pre-registered null, shipped <tspan class="mono" font-size="12">v0.1.0</tspan></text>

    <text x="28" y="216" class="mono slate" font-size="9" letter-spacing="1.6">EVERY ASSUMPTION LINKED TO ITS PROBE</text>
  </g>

  <!-- glyph: miniature null IRF -->
  <g transform="translate(342,32)">
    <line x1="0" y1="14" x2="38" y2="14" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 3"/>
    <path d="M0,14 C8,11 16,17 24,13 S34,15 38,13" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="38" cy="13" r="1.8" fill="#E8E4DA"/>
  </g>
</svg>
