<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300" role="img" aria-labelledby="t d">
  <title id="t">Maxime Gourguechon — econometrics, machine learning, computer vision</title>
  <desc id="d">Profile banner. On the right, an impulse-response chart draws itself: the estimate hugs zero inside a widening confidence band. Caption: beta-hat of h is approximately zero, shipped anyway.</desc>
  <style>
    .bone  { fill:#E8E4DA; }
    .slate { fill:#9AA3AB; }
    .gold  { fill:#D4AF37; }
    .serif { font-family: Georgia, 'Times New Roman', serif; }
    .sans  { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .mono  { font-family: 'Cascadia Code', 'SF Mono', Consolas, 'Liberation Mono', monospace; }

    .fade  { animation: fade .8s ease-out both; }
    .f1 { animation-delay: .05s; } .f2 { animation-delay: .18s; }
    .f3 { animation-delay: .32s; } .f4 { animation-delay: .46s; }
    .band  { animation: breathe 1.1s ease-out .55s both; }
    .irf   { animation: draw 1.9s cubic-bezier(.4,0,.2,1) .7s both; }
    .dot,
    .cap   { animation: fade .6s ease-out 2.45s both; }

    @keyframes fade    { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    @keyframes breathe { from { opacity:0; } to { opacity:.14; } }
    @keyframes draw    { from { stroke-dasharray:720; stroke-dashoffset:720; }
                         to   { stroke-dasharray:720; stroke-dashoffset:0; } }
    @media (prefers-reduced-motion: reduce) {
      .fade,.band,.irf,.dot,.cap { animation:none; }
      .band { opacity:.14; }
    }
  </style>

  <!-- card -->
  <rect x="1.5" y="1.5" width="957" height="297" rx="18" fill="#101214" stroke="#262B30" stroke-width="1.5"/>

  <!-- ============ left: identity ============ -->
  <g class="fade f1">
    <text x="56" y="76" class="mono gold" font-size="11" letter-spacing="2.4">ECONOMETRICS&#160;&#160;&#183;&#160;&#160;MACHINE LEARNING&#160;&#160;&#183;&#160;&#160;COMPUTER VISION</text>
  </g>
  <g class="fade f2">
    <text x="54" y="128" class="serif bone" font-size="42">Maxime Gourguechon</text>
  </g>
  <g class="fade f3">
    <text x="56" y="166" class="sans slate" font-size="16">I ship the estimate the data supports.</text>
    <text x="56" y="196" class="serif bone" font-size="19" font-style="italic">even when it is zero.</text>
  </g>
  <g class="fade f4">
    <text x="56" y="246" class="mono slate" font-size="10.5" letter-spacing="1.6">POINT-IN-TIME DATA&#160;&#160;<tspan class="gold">&#183;</tspan>&#160;&#160;PURGED CV&#160;&#160;<tspan class="gold">&#183;</tspan>&#160;&#160;PRE-REGISTERED ANALYSIS</text>
  </g>

  <!-- ============ right: the null IRF ============ -->
  <!-- gridlines -->
  <g stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1">
    <line x1="576" y1="105" x2="906" y2="105"/>
    <line x1="576" y1="205" x2="906" y2="205"/>
  </g>
  <!-- zero line -->
  <line x1="576" y1="155" x2="906" y2="155" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 5"/>
  <!-- axes -->
  <line x1="576" y1="70"  x2="576" y2="240" stroke="#3A3F45" stroke-width="1.2"/>
  <line x1="576" y1="240" x2="906" y2="240" stroke="#3A3F45" stroke-width="1.2"/>
  <!-- ticks -->
  <g class="mono slate" font-size="9.5">
    <text x="576" y="253" text-anchor="middle">0</text>
    <text x="682" y="253" text-anchor="middle">4</text>
    <text x="792" y="253" text-anchor="middle">8</text>
    <text x="902" y="253" text-anchor="middle">12</text>
  </g>
  <text x="741" y="272" text-anchor="middle" class="mono slate" font-size="10" letter-spacing="1.4">HORIZON&#160;&#160;h&#160;&#160;(QUARTERS)</text>
  <text x="545" y="155" text-anchor="middle" class="mono slate" font-size="10" letter-spacing="1.4" transform="rotate(-90 545 155)">&#916; ln EMPLOYMENT</text>

  <!-- confidence band: widens with horizon -->
  <path class="band" fill="#D4AF37" opacity=".14"
        d="M580,146 C630,141 700,138 760,135 S870,128 902,124
           L902,187 C870,183 780,177 720,174 S625,166 580,164 Z"/>

  <!-- point estimate -->
  <path class="irf" fill="none" stroke="#D4AF37" stroke-width="2.4" stroke-linecap="round"
        d="M580,155 C608,150 632,161 658,157 S704,146 728,153 S772,161 802,151 S866,158 902,151"/>
  <circle class="dot" cx="902" cy="151" r="3.4" fill="#E8E4DA"/>

  <!-- caption -->
  <text x="902" y="96" text-anchor="end" class="mono cap gold" font-size="12" letter-spacing="1">&#946;&#770;(h) &#8776; 0&#160;&#160;&#183;&#160;&#160;shipped anyway</text>
</svg>
