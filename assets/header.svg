<svg viewBox="0 0 900 300" width="900" height="300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Maxime Gourguechon — Data Scientist. Régression OLS animée qui s'ajuste en direct.">
  <style>
    /* Palette (light par défaut, dark via media query) */
    .name   { fill:#24292f; font: 700 34px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
    .sub    { fill:#57606a; font: 400 15px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
    .term   { fill:#57606a; font: 400 14px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
    .result { fill:#0969DA; font: 700 14px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
    .grid   { stroke:#d0d7de; stroke-width:0.6; }
    .pt     { fill:#0969DA; }
    .fit    { stroke:#1F6FEB; stroke-width:2.5; fill:none; }
    .band   { fill:#0969DA; }
    .cursor { fill:#0969DA; }

    @media (prefers-color-scheme: dark) {
      .name { fill:#e6edf3; }
      .sub, .term { fill:#9198a1; }
      .grid { stroke:#30363d; }
      .pt   { fill:#58A6FF; }
      .fit  { stroke:#58A6FF; }
      .band { fill:#58A6FF; }
      .result, .cursor { fill:#58A6FF; }
    }

    /* Animations */
    .pt   { opacity:0; animation: pop 0.45s ease-out forwards; }
    .fit  { stroke-dasharray:1; stroke-dashoffset:1; animation: draw 1.6s ease-in-out 2.0s forwards; }
    .band { opacity:0; animation: fadeband 1.2s ease-out 3.4s forwards; }
    .line-a { opacity:0; animation: fadein 0.5s ease-out 0.2s forwards; }
    .line-b { opacity:0; animation: fadein 0.5s ease-out 0.9s forwards; }
    .line-c { opacity:0; animation: fadein 0.5s ease-out 1.6s forwards; }
    .line-d { opacity:0; animation: fadein 0.6s ease-out 3.7s forwards; }
    .cursor { animation: blink 1.1s step-end infinite; }

    @keyframes pop      { to { opacity:1; } }
    @keyframes draw     { to { stroke-dashoffset:0; } }
    @keyframes fadeband { to { opacity:0.10; } }
    @keyframes fadein   { to { opacity:1; } }
    @keyframes blink    { 50% { opacity:0; } }

    /* Accessibilité : tout visible immédiatement si l'utilisateur refuse le mouvement */
    @media (prefers-reduced-motion: reduce) {
      .pt, .line-a, .line-b, .line-c, .line-d { animation:none; opacity:1; }
      .fit  { animation:none; stroke-dashoffset:0; }
      .band { animation:none; opacity:0.10; }
      .cursor { animation:none; }
    }
  </style>

  <!-- Grille discrète (zone du nuage de points) -->
  <g class="grid">
    <line x1="430" y1="60"  x2="880" y2="60"/>
    <line x1="430" y1="120" x2="880" y2="120"/>
    <line x1="430" y1="180" x2="880" y2="180"/>
    <line x1="430" y1="240" x2="880" y2="240"/>
    <line x1="520" y1="40"  x2="520" y2="260"/>
    <line x1="640" y1="40"  x2="640" y2="260"/>
    <line x1="760" y1="40"  x2="760" y2="260"/>
  </g>

  <!-- Intervalle de confiance (95 %) -->
  <polygon class="band" points="430,220 865,40 865,70 430,250"/>

  <!-- Nuage de points (apparition séquentielle) -->
  <g>
    <circle class="pt" cx="440" cy="240" r="4" style="animation-delay:0.10s"/>
    <circle class="pt" cx="460" cy="212" r="4" style="animation-delay:0.19s"/>
    <circle class="pt" cx="480" cy="224" r="4" style="animation-delay:0.28s"/>
    <circle class="pt" cx="505" cy="194" r="4" style="animation-delay:0.37s"/>
    <circle class="pt" cx="525" cy="206" r="4" style="animation-delay:0.46s"/>
    <circle class="pt" cx="550" cy="175" r="4" style="animation-delay:0.55s"/>
    <circle class="pt" cx="570" cy="188" r="4" style="animation-delay:0.64s"/>
    <circle class="pt" cx="595" cy="157" r="4" style="animation-delay:0.73s"/>
    <circle class="pt" cx="615" cy="170" r="4" style="animation-delay:0.82s"/>
    <circle class="pt" cx="640" cy="138" r="4" style="animation-delay:0.91s"/>
    <circle class="pt" cx="660" cy="152" r="4" style="animation-delay:1.00s"/>
    <circle class="pt" cx="685" cy="120" r="4" style="animation-delay:1.09s"/>
    <circle class="pt" cx="705" cy="133" r="4" style="animation-delay:1.18s"/>
    <circle class="pt" cx="730" cy="101" r="4" style="animation-delay:1.27s"/>
    <circle class="pt" cx="750" cy="115" r="4" style="animation-delay:1.36s"/>
    <circle class="pt" cx="775" cy="83"  r="4" style="animation-delay:1.45s"/>
    <circle class="pt" cx="795" cy="96"  r="4" style="animation-delay:1.54s"/>
    <circle class="pt" cx="820" cy="64"  r="4" style="animation-delay:1.63s"/>
    <circle class="pt" cx="840" cy="77"  r="4" style="animation-delay:1.72s"/>
    <circle class="pt" cx="858" cy="50"  r="4" style="animation-delay:1.81s"/>
  </g>

  <!-- Droite de régression (se trace après les points) -->
  <path class="fit" d="M 430 235 L 865 55" pathLength="1"/>

  <!-- Identité + terminal -->
  <text class="name" x="46" y="78">Maxime Gourguechon</text>
  <text class="sub"  x="48" y="106">Data Scientist · Économétrie × Machine Learning</text>
  <text class="sub"  x="48" y="128">Rigueur statistique · De l'analytics à la recherche</text>

  <text class="term line-a" x="48" y="176">&gt; import econometrics as pourquoi</text>
  <text class="term line-b" x="48" y="200">&gt; import machine_learning as comment</text>
  <text class="term line-c" x="48" y="224">&gt; model.fit(X, y)</text>
  <g class="line-d">
    <text class="result" x="48" y="252">β̂ = 0.87  [0.79, 0.95]   R² = 0.93   p &lt; 0.01</text>
    <rect class="cursor" x="392" y="240" width="8" height="14"/>
  </g>
</svg>
