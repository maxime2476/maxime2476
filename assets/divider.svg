<svg viewBox="0 0 900 16" width="900" height="16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#0969DA" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#1F6FEB" stop-opacity="1"/>
      <stop offset="1"   stop-color="#0969DA" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .flow  { stroke:#58A6FF; stroke-width:2.5; stroke-linecap:round;
             stroke-dasharray:22 278; animation: flow 3.2s linear infinite; }
    .flow2 { animation-delay:1.6s; opacity:0.6; }
    @keyframes flow { to { stroke-dashoffset:-300; } }
    @media (prefers-reduced-motion: reduce) { .flow, .flow2 { animation:none; stroke-dasharray:none; opacity:0.4; } }
  </style>
  <path d="M0 8 H900" stroke="url(#base)" stroke-width="2.5"/>
  <path class="flow"  d="M0 8 H900" pathLength="300" fill="none"/>
  <path class="flow flow2" d="M0 8 H900" pathLength="300" fill="none"/>
  <circle cx="450" cy="8" r="3" fill="#1F6FEB"/>
</svg>
