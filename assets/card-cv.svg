<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="420" height="240" role="img" aria-labelledby="t">
  <title id="t">Computer vision: coral instance segmentation with a YOLO plus SAM pipeline, evaluated with domain stratification, in-situ versus ex-situ, at Aubay with CNRS Fondation Science4Reefs</title>
  <style>
    .bone{fill:#E8E4DA}.slate{fill:#9AA3AB}.gold{fill:#D4AF37}
    .serif{font-family:Georgia,'Times New Roman',serif}
    .sans{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif}
    .mono{font-family:'Cascadia Code','SF Mono',Consolas,'Liberation Mono',monospace}
    .in{animation:fade .7s ease-out .2s both}
    @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    @media (prefers-reduced-motion:reduce){.in{animation:none}}
  </style>
  <rect x="1" y="1" width="418" height="238" rx="16" fill="#101214" stroke="#262B30" stroke-width="1.5"/>
  <g class="in">
    <text x="28" y="48" class="mono gold" font-size="10.5" letter-spacing="2.6">COMPUTER VISION</text>
    <text x="27" y="80" class="serif bone" font-size="21.5">Aggregates can hide collapse</text>
    <line x1="28" y1="98" x2="392" y2="98" stroke="#262B30" stroke-width="1"/>

    <text x="28"  y="128" class="mono slate" font-size="10" letter-spacing="1.4">TASK</text>
    <text x="126" y="128" class="sans bone" font-size="13">coral instance segmentation</text>

    <text x="28"  y="158" class="mono slate" font-size="10" letter-spacing="1.4">MODELS</text>
    <text x="126" y="158" class="sans bone" font-size="13">YOLO + SAM pipeline</text>

    <text x="28"  y="188" class="mono slate" font-size="10" letter-spacing="1.4">EVAL</text>
    <text x="126" y="188" class="sans bone" font-size="13">domain-stratified, in-situ vs ex-situ</text>

    <text x="28" y="216" class="mono slate" font-size="9" letter-spacing="1.6">AUBAY &#215; CNRS FONDATION SCIENCE4REEFS</text>
  </g>

  <!-- glyph: two instance masks, coral fill + gold dashed selection -->
  <g transform="translate(336,24)">
    <path d="M10,8 C22,4 34,10 35,20 C36,30 26,36 16,33 C6,30 2,14 10,8 Z"
          fill="#C96F5E" opacity=".85"/>
    <path d="M22,14 C34,10 46,16 45,26 C44,36 33,41 24,37 C15,33 12,19 22,14 Z"
          fill="none" stroke="#D4AF37" stroke-width="1.6" stroke-dasharray="4 3"/>
  </g>
</svg>
